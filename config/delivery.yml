apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: note
  labels:
    app.kubernetes.io/part-of: note
    apps.tanzu.vmware.com/workload-type: web
    kapp.k14s.io/app: "1649345216294079888"
    kapp.k14s.io/association: v1.7a196218cbd0572f3e0887b22f49dac5
    app.kubernetes.io/component: run
    carto.run/workload-name: note
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        boot.spring.io/actuator: http://:8080/actuator
        boot.spring.io/version: 2.2.13.RELEASE
        conventions.apps.tanzu.vmware.com/applied-conventions: |-
          appliveview-sample/app-live-view-connector
          appliveview-sample/app-live-view-appflavours
          appliveview-sample/app-live-view-systemproperties
          spring-boot-convention/spring-boot
          spring-boot-convention/spring-boot-web
          spring-boot-convention/spring-boot-actuator
          spring-boot-convention/service-intent-mysql
        developer.conventions/target-containers: workload
        kapp.k14s.io/change-rule.delete: delete before deleting git-ssh
        kapp.k14s.io/change-rule.upsert: upsert after upserting git-ssh
        kapp.k14s.io/identity: v1;tmaki/carto.run/Workload/note;carto.run/v1alpha1
        services.conventions.apps.tanzu.vmware.com/mysql: mysql-connector-java/8.0.22
      labels:
        app.kubernetes.io/component: run
        app.kubernetes.io/part-of: note
        apps.tanzu.vmware.com/workload-type: web
        carto.run/workload-name: note
        conventions.apps.tanzu.vmware.com/framework: spring-boot
        kapp.k14s.io/app: "1649345216294079888"
        kapp.k14s.io/association: v1.7a196218cbd0572f3e0887b22f49dac5
        services.conventions.apps.tanzu.vmware.com/mysql: workload
        tanzu.app.live.view: "true"
        tanzu.app.live.view.application.flavours: spring-boot
        tanzu.app.live.view.application.name: note
    spec:
      containers:
      - env:
        - name: GITHUB_ACCESS_TOKEN
          value: ${k8s.bindings.note-config.github_access_token}
        - name: GITHUB_WEBHOOK_SECRET
          value: ${k8s.bindings.note-config.github_webhook_secret}
        - name: SPRING_SECURITY_USER_NAME
          value: ${k8s.bindings.note-config.note_username}
        - name: SPRING_SECURITY_USER_PASSWORD
          value: ${k8s.bindings.note-config.note_password}
        - name: SPRING_SENDGRID_API_KEY
          value: ${k8s.bindings.note-config.sendgrid_api_key}
        - name: JWT_SIGNING_KEY
          value: file:///bindings/note-config/private_key.pem
        - name: JWT_VERIFIER_KEY
          value: file:///bindings/note-config/public.pem
        - name: JAVA_TOOL_OPTIONS
          value: -XX:ReservedCodeCacheSize=32M -Xss512k -Dfile.encoding="UTF-8" -Dmanagement.endpoint.health.show-details="always" -Dmanagement.endpoints.web.base-path="/actuator" -Dmanagement.endpoints.web.exposure.include="*" -Dmanagement.server.port="8080" -Dserver.port="8080" -Duser.country="JP" -Duser.language="ja" -Duser.timezone="Asia/Tokyo"
        - name: BPL_JVM_THREAD_COUNT
          value: "20"
        - name: SERVER_TOMCAT_MAX_THREADS
          value: "4"
        - name: SPRING_APPLICATION_JSON
          value: |
            {
              "spring.datasource.hikari.data-source-properties.allowMultiQueries": true,
              "spring.datasource.hikari.data-source-properties.useSSL": false
            }
        - name: MANAGEMENT_METRICS_EXPORT_WAVEFRONT_ENABLED
          value: "false"
        - name: SPRING_ZIPKIN_ENABLED
          value: "false"
        - name: MANAGEMENT_METRICS_EXPORT_PROMETHEUS_RSOCKET_ENABLED
          value: "false"
        - name: MANAGEMENT_ENDPOINT_HEAPDUMP_ENABLED
          value: "false"
        - name: MANAGEMENT_ENDPOINT_THREADDUMP_ENABLED
          value: "false"
        - name: INFO_JAVA_VERSION
          value: ${java.vm.version} / ${java.vm.name}
        - name: INFO_JAVA_VENDOR
          value: ${java.vm.vendor}
        image: harbor.dhaka.cf-app.com/dhaka/supply-chain/note-tmaki@sha256:e45297a3164fe5c680837701a72f274daf50315aeb99e05f979a74ae68d069b7
        name: workload
        ports:
        - containerPort: 8080
          protocol: TCP
        resources:
          limits:
            memory: 256Mi
          requests:
            memory: 256Mi
        securityContext:
          runAsUser: 1000
      serviceAccountName: default

